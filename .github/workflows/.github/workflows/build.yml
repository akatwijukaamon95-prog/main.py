name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip git zip unzip openjdk-17-jdk
        pip install buildozer cython kivy

    - name: Initialize buildozer
      run: |
        buildozer init

    - name: Modify spec
      run: |
        sed -i 's/title = .*/title = Real DJ App/' buildozer.spec
        sed -i 's/package.name = .*/package.name = realdj/' buildozer.spec
        sed -i 's/package.domain = .*/package.domain = org.test/' buildozer.spec
        sed -i 's/requirements = .*/requirements = python3,kivy/' buildozer.spec

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: dj-apk
        path: bin/*.apk
